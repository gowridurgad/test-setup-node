name: testing1447
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Debug: confirm versions and whether a token is being set/exported
      - name: Debug npm OIDC vs token env
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "registry: $(npm config get registry)"
          echo "NODE_AUTH_TOKEN is: '${NODE_AUTH_TOKEN-<unset>}'"
          echo "Relevant env vars:"
          env | grep -E 'NODE_AUTH_TOKEN|ACTIONS_ID_TOKEN|ACTIONS_ID_TOKEN_REQUEST' || true
          echo "npm whoami (may fail if not authenticated yet):"
          npm whoami || true

      - run: npm publish
