name: testing1286
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        id: setup-python 
        with:
          python-version: '3.10'

      - name: Show tool cache location
        run: echo $RUNNER_TOOL_CACHE

      - name: List Python versions
        run: ls -R $RUNNER_TOOL_CACHE/Python
        
     
