name: testing1285
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install poetry
      run: pipx install poetry
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Check Poetry Python version
      run: poetry env info
   
